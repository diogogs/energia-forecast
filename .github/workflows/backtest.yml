name: Weekly backtest

on:
  schedule:
    # Sundays 05:00 UTC — refresh the like-for-like backtest, the simulated-history table and
    # the MLflow record (weekly retrain cadence).
    - cron: "0 5 * * 0"
  workflow_dispatch: {}

concurrency:
  group: weekly-backtest
  cancel-in-progress: false

jobs:
  backtest:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      # Optional — when set (DagsHub), MLflow logs remotely; otherwise it falls back to a local
      # (ephemeral) store and only pred.backtest_predictions persists.
      MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
      MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
      MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Backtest + persist folds + track
        run: uv run python -m src.models.run_backtest
