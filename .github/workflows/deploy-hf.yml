name: Deploy API to HF Spaces

# Auto-deploys the read-only API to a Hugging Face Docker Space on every push that touches the
# API/model code or the image, plus manual dispatch. Requires (one-time): the HF_TOKEN secret,
# the HF_SPACE variable ("username/space-name"), and the DATABASE_URL_RO secret.
on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "Dockerfile"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/deploy_hf.py"
      - ".github/workflows/deploy-hf.yml"
  workflow_dispatch: {}

concurrency:
  group: deploy-hf
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Skip cleanly on forks / before HF_SPACE is configured.
    if: vars.HF_SPACE != ''
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      HF_SPACE: ${{ vars.HF_SPACE }}
      DATABASE_URL_RO: ${{ secrets.DATABASE_URL_RO }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Push to Hugging Face Space
        run: uv run --with huggingface_hub python .github/deploy_hf.py
