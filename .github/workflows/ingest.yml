name: Daily ingest

on:
  schedule:
    # 06:30 UTC daily — after the ECMWF 00Z run is disseminated and before the 07:00 t_issue,
    # so the self-healing window captures the freshest legal data for that day's forecast.
    # The second entry is a retry ticket against GitHub's scheduler delays (observed +3h30):
    # ingestion is idempotent, so an extra run is harmless, and it refreshes the window for
    # the predict workflow's own retry attempts.
    - cron: "30 6 * * *"
    - cron: "45 7 * * *"
  workflow_dispatch: {}

# Never run two ingests at once (they upsert the same rows); let the running one finish.
concurrency:
  group: daily-ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Self-healing ingest [today-3d, today]
        run: uv run python -m src.ingestion.daily

      # Monitoring, not ingestion: compares REN consumption against ENTSO-E's independent
      # publication and records the outcome in ops.dq_log. Skips itself without the token
      # and never fails the workflow (an ENTSO-E outage is an alert, not a pipeline failure).
      - name: Cross-check REN vs ENTSO-E
        env:
          ENTSOE_API_TOKEN: ${{ secrets.ENTSOE_API_TOKEN }}
        run: uv run python -m src.monitoring.cross_validation
